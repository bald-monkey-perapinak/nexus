version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexus
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Порт не пробрасываем наружу — только внутри Docker-сети
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Порт не пробрасываем наружу

  backend:
    build:
      context: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    # Только внутренний порт — nginx проксирует
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"  # только фронтенд доступен снаружи

  bot:
    build:
      context: ./bot
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
